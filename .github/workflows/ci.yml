name: ci

on:
  pull_request:
    branches:
      - develop
      - staging
      - main
  push:
    branches:
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  db-migration:
    name: db-migration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/bidmart_ci
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db

      - name: Install sqlx-cli
        shell: bash
        run: |
          set -euo pipefail
          cargo install sqlx-cli --locked --no-default-features --features rustls,postgres

      - name: Verify database migrations
        shell: bash
        run: |
          set -euo pipefail
          sqlx database create
          sqlx migrate run

  ci:
    name: ci
    needs: db-migration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate trigger refs
        shell: bash
        run: |
          set -euo pipefail

          is_valid_ref() {
            [[ "$1" =~ ^[A-Za-z0-9._/-]+$ ]]
          }

          event="${GITHUB_EVENT_NAME:-}"
          if [[ -z "$event" ]]; then
            echo "Missing event name."
            exit 1
          fi

          if [[ "$event" == "pull_request" ]]; then
            base="${GITHUB_BASE_REF:-}"
            head="${GITHUB_HEAD_REF:-}"
            if [[ -z "$base" || -z "$head" ]]; then
              echo "Missing pull request refs."
              exit 1
            fi
            if ! is_valid_ref "$base" || ! is_valid_ref "$head"; then
              echo "Malformed pull request refs."
              exit 1
            fi
            if [[ "$base" == "main" && "$head" != "staging" ]]; then
              echo "Invalid branch flow to main. Only staging -> main is allowed."
              exit 1
            fi
            if [[ "$base" == "staging" && "$head" != "develop" ]]; then
              echo "Invalid branch flow to staging. Only develop -> staging is allowed."
              exit 1
            fi
          elif [[ "$event" == "push" ]]; then
            ref_name="${GITHUB_REF_NAME:-}"
            if [[ -z "$ref_name" || "$ref_name" != "develop" ]]; then
              echo "Unexpected push ref. This workflow only accepts pushes to develop."
              exit 1
            fi
            if ! is_valid_ref "$ref_name"; then
              echo "Malformed push ref."
              exit 1
            fi
          else
            echo "Unsupported event type: $event"
            exit 1
          fi

      - name: Detect pull request change scope
        id: pr_scope
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const ciOnlyPatterns = [
              /^\.github\//,
            ];

            const hasNonCiChanges = files.some((file) => {
              return !ciOnlyPatterns.some((pattern) => pattern.test(file.filename));
            });

            core.info(`PR files: ${files.length}, hasNonCiChanges=${hasNonCiChanges}`);
            core.setOutput('has_non_ci_changes', hasNonCiChanges ? 'true' : 'false');

      - name: Detect project type
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          has_rust="false"
          has_node="false"
          node_manager=""
          node_lockfile=""

          if [[ -f "Cargo.toml" ]]; then
            has_rust="true"
          fi

          if [[ -f "package.json" ]]; then
            has_node="true"
            if [[ -f "pnpm-lock.yaml" ]]; then
              node_manager="pnpm"
              node_lockfile="pnpm-lock.yaml"
            elif [[ -f "yarn.lock" ]]; then
              node_manager="yarn"
              node_lockfile="yarn.lock"
            elif [[ -f "package-lock.json" ]]; then
              node_manager="npm"
              node_lockfile="package-lock.json"
            elif [[ -f "npm-shrinkwrap.json" ]]; then
              node_manager="npm"
              node_lockfile="npm-shrinkwrap.json"
            else
              echo "package.json found, but no supported lockfile is present."
              exit 1
            fi
          fi

          if [[ "$has_rust" == "false" && "$has_node" == "false" ]]; then
            echo "No supported pipeline detected. Expected Cargo.toml or package.json."
            exit 1
          fi

          {
            echo "has_rust=$has_rust"
            echo "has_node=$has_node"
            echo "node_manager=$node_manager"
            echo "node_lockfile=$node_lockfile"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Rust toolchain
        if: steps.detect.outputs.has_rust == 'true'
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        if: steps.detect.outputs.has_rust == 'true'
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db

      - name: Rust checks
        if: steps.detect.outputs.has_rust == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all --all-features
          cargo build --release

      - name: Install cargo-audit
        if: steps.detect.outputs.has_rust == 'true' && github.event_name == 'pull_request' && steps.pr_scope.outputs.has_non_ci_changes == 'true' && (github.base_ref == 'staging' || github.base_ref == 'main')
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked

      - name: Rust security audit
        if: steps.detect.outputs.has_rust == 'true' && github.event_name == 'pull_request' && steps.pr_scope.outputs.has_non_ci_changes == 'true' && (github.base_ref == 'staging' || github.base_ref == 'main')
        shell: bash
        run: |
          set -euo pipefail
          cargo audit

      - name: Set up Node.js (npm with cache)
        if: steps.detect.outputs.has_node == 'true' && steps.detect.outputs.node_manager == 'npm'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.node_lockfile }}

      - name: Set up Node.js (pnpm/yarn)
        if: steps.detect.outputs.has_node == 'true' && steps.detect.outputs.node_manager != 'npm'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Enable Corepack
        if: steps.detect.outputs.has_node == 'true' && (steps.detect.outputs.node_manager == 'pnpm' || steps.detect.outputs.node_manager == 'yarn')
        shell: bash
        run: |
          set -euo pipefail
          corepack enable

      - name: Install Node dependencies
        if: steps.detect.outputs.has_node == 'true'
        shell: bash
        run: |
          set -euo pipefail

          manager="${{ steps.detect.outputs.node_manager }}"
          case "$manager" in
            npm)
              npm ci
              ;;
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              yarn install --frozen-lockfile
              ;;
            *)
              echo "Unsupported package manager: $manager"
              exit 1
              ;;
          esac

      - name: Node checks
        if: steps.detect.outputs.has_node == 'true'
        shell: bash
        run: |
          set -euo pipefail

          manager="${{ steps.detect.outputs.node_manager }}"

          run_script_if_present() {
            local script_name="$1"
            if node -e "const pkg=require('./package.json');process.exit(pkg.scripts && Object.prototype.hasOwnProperty.call(pkg.scripts, '$script_name') ? 0 : 1)"; then
              case "$manager" in
                npm)
                  npm run "$script_name"
                  ;;
                pnpm)
                  pnpm run "$script_name"
                  ;;
                yarn)
                  yarn "$script_name"
                  ;;
              esac
            else
              echo "Skipping '$script_name' (script not present)."
            fi
          }

          run_script_if_present "lint"

          if node -e "const pkg=require('./package.json');process.exit(pkg.scripts && Object.prototype.hasOwnProperty.call(pkg.scripts, 'format:check') ? 0 : 1)"; then
            run_script_if_present "format:check"
          elif node -e "const p=require('./package.json'); const d=Object.assign({}, p.dependencies || {}, p.devDependencies || {}); process.exit(Object.prototype.hasOwnProperty.call(d, 'prettier') ? 0 : 1)"; then
            case "$manager" in
              npm)
                npx --no-install prettier --check .
                ;;
              pnpm)
                pnpm exec prettier --check .
                ;;
              yarn)
                yarn prettier --check .
                ;;
            esac
          else
            echo "Skipping format check (no format:check script or prettier dependency)."
          fi

          run_script_if_present "test"

      - name: Node security audit
        if: steps.detect.outputs.has_node == 'true' && github.event_name == 'pull_request' && steps.pr_scope.outputs.has_non_ci_changes == 'true' && (github.base_ref == 'staging' || github.base_ref == 'main')
        shell: bash
        run: |
          set -euo pipefail

          manager="${{ steps.detect.outputs.node_manager }}"
          case "$manager" in
            npm)
              npm audit --audit-level=high
              ;;
            pnpm)
              pnpm audit --audit-level high
              ;;
            yarn)
              yarn_major="$(yarn --version | cut -d. -f1)"
              if [[ "$yarn_major" -ge 2 ]]; then
                yarn npm audit --severity high
              else
                yarn audit --level high
              fi
              ;;
            *)
              echo "Unsupported package manager for audit: $manager"
              exit 1
              ;;
          esac
