name: ci

on:
  pull_request:
    branches:
      - ci-cd
      - staging
      - main
  push:
    branches:
      - ci-cd

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate trigger refs
        shell: bash
        run: |
          set -euo pipefail

          is_valid_ref() {
            [[ "$1" =~ ^[A-Za-z0-9._/-]+$ ]]
          }

          event="${GITHUB_EVENT_NAME:-}"
          if [[ -z "$event" ]]; then
            echo "Missing event name."
            exit 1
          fi

          if [[ "$event" == "pull_request" ]]; then
            base="${GITHUB_BASE_REF:-}"
            head="${GITHUB_HEAD_REF:-}"
            if [[ -z "$base" || -z "$head" ]]; then
              echo "Missing pull request refs."
              exit 1
            fi
            if ! is_valid_ref "$base" || ! is_valid_ref "$head"; then
              echo "Malformed pull request refs."
              exit 1
            fi
            if [[ "$base" == "main" && "$head" != "staging" ]]; then
              echo "Invalid branch flow to main. Only staging -> main is allowed."
              exit 1
            fi
            if [[ "$base" == "staging" && "$head" != "ci-cd" ]]; then
              echo "Invalid branch flow to staging. Only ci-cd -> staging is allowed."
              exit 1
            fi
          elif [[ "$event" == "push" ]]; then
            ref_name="${GITHUB_REF_NAME:-}"
            if [[ -z "$ref_name" || "$ref_name" != "ci-cd" ]]; then
              echo "Unexpected push ref. This workflow only accepts pushes to ci-cd."
              exit 1
            fi
            if ! is_valid_ref "$ref_name"; then
              echo "Malformed push ref."
              exit 1
            fi
          else
            echo "Unsupported event type: $event"
            exit 1
          fi

      - name: Detect project type
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          has_rust="false"
          has_node="false"
          node_manager=""
          node_lockfile=""

          if [[ -f "Cargo.toml" ]]; then
            has_rust="true"
          fi

          if [[ -f "package.json" ]]; then
            has_node="true"
            if [[ -f "pnpm-lock.yaml" ]]; then
              node_manager="pnpm"
              node_lockfile="pnpm-lock.yaml"
            elif [[ -f "yarn.lock" ]]; then
              node_manager="yarn"
              node_lockfile="yarn.lock"
            elif [[ -f "package-lock.json" ]]; then
              node_manager="npm"
              node_lockfile="package-lock.json"
            elif [[ -f "npm-shrinkwrap.json" ]]; then
              node_manager="npm"
              node_lockfile="npm-shrinkwrap.json"
            else
              echo "package.json found, but no supported lockfile is present."
              exit 1
            fi
          fi

          if [[ "$has_rust" == "false" && "$has_node" == "false" ]]; then
            echo "No supported pipeline detected. Expected Cargo.toml or package.json."
            exit 1
          fi

          {
            echo "has_rust=$has_rust"
            echo "has_node=$has_node"
            echo "node_manager=$node_manager"
            echo "node_lockfile=$node_lockfile"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Rust toolchain
        if: steps.detect.outputs.has_rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        if: steps.detect.outputs.has_rust == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Rust checks
        if: steps.detect.outputs.has_rust == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all --all-features

      - name: Install cargo-audit
        if: steps.detect.outputs.has_rust == 'true' && github.event_name == 'pull_request' && (github.base_ref == 'staging' || github.base_ref == 'main')
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked

      - name: Rust security audit
        if: steps.detect.outputs.has_rust == 'true' && github.event_name == 'pull_request' && (github.base_ref == 'staging' || github.base_ref == 'main')
        shell: bash
        run: |
          set -euo pipefail
          cargo audit

      - name: Set up Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect.outputs.node_manager }}
          cache-dependency-path: ${{ steps.detect.outputs.node_lockfile }}

      - name: Enable Corepack
        if: steps.detect.outputs.has_node == 'true' && (steps.detect.outputs.node_manager == 'pnpm' || steps.detect.outputs.node_manager == 'yarn')
        shell: bash
        run: |
          set -euo pipefail
          corepack enable

      - name: Install Node dependencies
        if: steps.detect.outputs.has_node == 'true'
        shell: bash
        run: |
          set -euo pipefail

          manager="${{ steps.detect.outputs.node_manager }}"
          case "$manager" in
            npm)
              npm ci
              ;;
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              yarn install --frozen-lockfile
              ;;
            *)
              echo "Unsupported package manager: $manager"
              exit 1
              ;;
          esac

      - name: Node checks
        if: steps.detect.outputs.has_node == 'true'
        shell: bash
        run: |
          set -euo pipefail

          manager="${{ steps.detect.outputs.node_manager }}"

          run_script_if_present() {
            local script_name="$1"
            if node -e "const pkg=require('./package.json');process.exit(pkg.scripts && Object.prototype.hasOwnProperty.call(pkg.scripts, '$script_name') ? 0 : 1)"; then
              case "$manager" in
                npm)
                  npm run "$script_name"
                  ;;
                pnpm)
                  pnpm run "$script_name"
                  ;;
                yarn)
                  yarn "$script_name"
                  ;;
              esac
            else
              echo "Skipping '$script_name' (script not present)."
            fi
          }

          run_script_if_present "lint"

          if node -e "const pkg=require('./package.json');process.exit(pkg.scripts && Object.prototype.hasOwnProperty.call(pkg.scripts, 'format:check') ? 0 : 1)"; then
            run_script_if_present "format:check"
          elif node -e "const p=require('./package.json'); const d=Object.assign({}, p.dependencies || {}, p.devDependencies || {}); process.exit(Object.prototype.hasOwnProperty.call(d, 'prettier') ? 0 : 1)"; then
            case "$manager" in
              npm)
                npx --no-install prettier --check .
                ;;
              pnpm)
                pnpm exec prettier --check .
                ;;
              yarn)
                yarn prettier --check .
                ;;
            esac
          else
            echo "Skipping format check (no format:check script or prettier dependency)."
          fi

          run_script_if_present "test"

      - name: Node security audit
        if: steps.detect.outputs.has_node == 'true' && github.event_name == 'pull_request' && (github.base_ref == 'staging' || github.base_ref == 'main')
        shell: bash
        run: |
          set -euo pipefail

          manager="${{ steps.detect.outputs.node_manager }}"
          case "$manager" in
            npm)
              npm audit --audit-level=high
              ;;
            pnpm)
              pnpm audit --audit-level high
              ;;
            yarn)
              yarn_major="$(yarn --version | cut -d. -f1)"
              if [[ "$yarn_major" -ge 2 ]]; then
                yarn npm audit --severity high
              else
                yarn audit --level high
              fi
              ;;
            *)
              echo "Unsupported package manager for audit: $manager"
              exit 1
              ;;
          esac
