name: cd-docker

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      CONTAINER_NAME: bidmart-auth-be
      SERVICE_PORT: 80
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build image (local for scan)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          load: true
          tags: local-scan:${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          image-ref: local-scan:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-ec2:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      CONTAINER_NAME: bidmart-auth-be
      SERVICE_PORT: 80
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Check deploy prerequisites
        id: deploy_gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${EC2_HOST:-}" && -n "${EC2_USER:-}" && -n "${EC2_SSH_KEY:-}" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "EC2 secrets are not fully configured. Skipping deployment step."
          echo "should_deploy=false" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 via SSH
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "${IMAGE}"
            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              docker rm -f "${CONTAINER_NAME}"
            fi
            docker run -d --restart unless-stopped \
              --name "${CONTAINER_NAME}" \
              -p "${SERVICE_PORT}:${SERVICE_PORT}" \
              "${IMAGE}"
